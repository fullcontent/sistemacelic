name: Synchronize Todoist
on:
  schedule:
   - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  sync_issues:
    name: Sync Issues
    runs-on: ubuntu-latest
    steps:
      - name: Sync issues
        id: sync
        uses: cobraz/todoist-action@v1.2.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          todoist-token: ${{ secrets.TODOIST_TOKEN }}
          query: |
            is:issue state:open archived:false sort:updated-desc assignee:fullcontent
          sync-file-name: ./sync.json
