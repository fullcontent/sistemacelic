name: Synchronize Todoist
on:
  schedule:
   - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  sync_issues:
    name: Sync Issues
    runs-on: ubuntu-latest
    steps:
      - name: Sync issues
        id: sync
        uses: cobraz/todoist-action@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          todoist-token: ${{ secrets.TODOIST_TOKEN }}
          query: |
            updated:>2020-06-01 archived:false sort:updated-desc assignee:fullcontent
            -label:backlog
          sync-file-name: ./sync.json
